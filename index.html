<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', serif;
    overflow-x: hidden;
}

/* Background Image */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('shared image.jpeg') no-repeat center center/cover;
    z-index: -2;
}

/* Dark Overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* Welcome Screen */
#welcome {
    position: fixed;
    width: 100%;
    height: 100%;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#openBtn {
    margin-top: 20px;
    padding: 12px 25px;
    background: gold;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    cursor: pointer;
}

/* Main Card */
.container {
    display: none;
    padding: 30px 15px;
}

.card {
    background: rgba(255,255,255,0.95);
    border-radius: 20px;
    padding: 25px;
    max-width: 500px;
    margin: auto;
    text-align: center;
    animation: fadeIn 2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

h1 {
    color: #b76e79;
}

.names {
    font-size: 30px;
    font-weight: bold;
    margin: 15px 0;
}

#countdown {
    margin: 15px 0;
}

/* Buttons */
.btn {
    margin: 10px;
    padding: 12px 18px;
    background: #800000;
    color: white;
    border-radius: 25px;
    text-decoration: none;
    display: inline-block;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- Welcome -->
<div id="welcome">
    <h1>💌 You're Invited 💌</h1>
    <button id="openBtn" onclick="openInvite()">Open Invitation</button>
</div>

<!-- Main -->
<div class="container" id="mainContent">
    <div class="card">

        <h1>💍 Wedding Invitation</h1>

        <p>With love and blessings, we invite you to celebrate</p>

        <div class="names">
            Siddalingesh ❤️ Pooja
        </div>

        <h2>8th April 2026</h2>
        <p>10:30 AM onwards</p>

        <p><b>Sri Siddeshwara Samuday Bhavan</b></p>
        <p>Ranebennur, Karnataka</p>

        <div id="countdown"></div>

        <!-- Map -->
        <a class="btn" 
        href="https://maps.app.goo.gl/nmNwUFc3bPjwTAnV7"
        target="_blank">
        📍 View Location
        </a>

        <p>We request your gracious presence 💖</p>

        <button class="btn" onclick="playMusic()">🎵 Play Music</button>

    </div>
</div>

<!-- Music -->
<audio id="music">
    <source src="WEDDING__song.mp3" type="audio/mpeg">
</audio>

<script>
function openInvite() {
    document.getElementById("welcome").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
}

var weddingDate = new Date("April 08, 2026 10:30:00").getTime();

setInterval(function() {
    var now = new Date().getTime();
    var distance = weddingDate - now;

    var days = Math.floor(distance / (1000*60*60*24));
    var hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    var minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    var seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        "⏳ " + days + "d " + hours + "h " + minutes + "m " + seconds + "s";
}, 1000);

function playMusic() {
    document.getElementById("music").play();
}
</script>

</body>
</html>
